<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Atelier AI Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg: #131314; --chat-bg: #1e1f20; --accent: #a8c7fa; }
        body { background: var(--bg); color: #e3e3e3; font-family: 'Google Sans', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 600px; width: 100%; }
        
        /* Chat Style */
        .chat-bubble { background: var(--chat-bg); padding: 20px; border-radius: 20px; margin-bottom: 20px; max-width: 90%; }
        .prompt-box { position: sticky; bottom: 20px; background: #282a2d; padding: 15px; border-radius: 30px; display: flex; flex-direction: column; gap: 10px; }
        input, textarea, select { background: transparent; border: none; color: white; padding: 10px; width: 100%; outline: none; }
        
        /* Kartu */
        #cardCanvas { width: 100%; aspect-ratio: 4/5; border-radius: 20px; padding: 30px; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 20px; transition: 0.5s; display: none; }
        
        /* Tema */
        .theme-luxury { border: 2px solid #c5a059; color: #c5a059; }
        .theme-cyber { background: #050505; border: 2px solid #00ffcc; color: #00ffcc; }
        .theme-anime { background: #fff; border: 2px solid #000; color: #000; }
        
        button { background: var(--accent); color: black; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="chat">
    <div class="chat-bubble" id="ai-greeting">
        Halo! Saya Atelier AI. Saya bisa bantu buatkan kartu ucapan digital yang keren untukmu. Siap untuk memulai?
        <br><br><button onclick="startWizard()">Mulai Buat Kartu</button>
    </div>
</div>

<!-- Input Form (Hidden at start) -->
<div class="container" id="editor" style="display:none;">
    <div id="cardCanvas" class="theme-luxury">
        <h2 id="cardTo">Untuk: ...</h2>
        <p id="cardMsg" style="font-size: 1.5em; margin: 20px 0;">...</p>
        <p id="cardFrom">Dari: ...</p>
    </div>

    <div class="prompt-box">
        <input type="text" id="toInput" placeholder="Untuk siapa?" oninput="update()">
        <textarea id="msgInput" placeholder="Isi pesan..." oninput="update()"></textarea>
        <input type="text" id="fromInput" placeholder="Dari siapa?" oninput="update()">
        <select id="themeSel" onchange="update()">
            <option value="theme-luxury">Luxury Gold</option>
            <option value="theme-cyber">Cyber Neon</option>
            <option value="theme-anime">Anime Style</option>
        </select>
        <button onclick="download4K()">Download 4K</button>
        <button onclick="shareLink()" style="background: #444; color: white;">Salin Link</button>
    </div>
</div>

<script>
    function startWizard() {
        document.getElementById('ai-greeting').innerHTML = "Bagus! Silakan isi detail kartu ucapanmu di bawah ini.";
        document.getElementById('editor').style.display = 'block';
        document.getElementById('cardCanvas').style.display = 'flex';
    }

    function update() {
        document.getElementById('cardTo').textContent = "Untuk: " + (document.getElementById('toInput').value || "...");
        document.getElementById('cardMsg').textContent = document.getElementById('msgInput').value || "...";
        document.getElementById('cardFrom').textContent = "Dari: " + (document.getElementById('fromInput').value || "...");
        document.getElementById('cardCanvas').className = document.getElementById('themeSel').value;
    }

    function download4K() {
        html2canvas(document.getElementById('cardCanvas'), { scale: 4 }).then(c => {
            const link = document.createElement('a');
            link.download = 'Atelier-Card.png';
            link.href = c.toDataURL('image/png', 1.0);
            link.click();
        });
    }

    function shareLink() {
        const data = btoa(JSON.stringify({
            t: document.getElementById('toInput').value,
            m: document.getElementById('msgInput').value,
            f: document.getElementById('fromInput').value,
            th: document.getElementById('themeSel').value
        }));
        navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?data=" + data);
        alert("Link unik disalin!");
    }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if (params.has('data')) {
            const d = JSON.parse(atob(params.get('data')));
            document.getElementById('toInput').value = d.t;
            document.getElementById('msgInput').value = d.m;
            document.getElementById('fromInput').value = d.f;
            document.getElementById('themeSel').value = d.th;
            document.getElementById('ai-greeting').style.display = 'none';
            document.getElementById('editor').style.display = 'block';
            document.getElementById('cardCanvas').style.display = 'flex';
            update();
        }
    };
</script>
</body>
</html>
