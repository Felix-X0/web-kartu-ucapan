<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Card Studio</title>
    <meta name="google-site-verification" content="eikd6Rzc695Y7uJtpPKJFB6zgb-V08adih6jovwYE6M" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="landingScreen" class="page-screen">
        <div class="hero-card">
            <h1>Atelier Card Studio</h1>
            <p>Karya seni kartu ucapan digital.</p>
            <button id="startBtn" class="cta-button">Mulai Mendesain</button>
        </div>
    </div>

    <div id="appScreen" class="page-screen hidden">
        <div class="studio-container">
            <header>
                <button id="backBtn">← Beranda</button>
            </header>
            
            <section id="cardCanvas" class="card-container theme-luxury">
                <p id="cardToText">Untuk: Kak Shinta</p>
                <p id="cardMessageText">Selamat Ulang Tahun!</p>
                <p id="cardFromText">Dari: Adun</p>
            </section>

            <div class="controls">
                <input type="text" id="toInput" placeholder="Nama Penerima" value="Kak Shinta">
                <textarea id="messageInput" rows="3">Selamat Ulang Tahun!</textarea>
                <input type="text" id="fromInput" placeholder="Nama Pengirim" value="Adun">
                <button id="shareBtn">Salin Tautan</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
