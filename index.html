<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="eikd6Rzc695Y7uJtpPKJFB6zgb-V08adih6jovwYE6M" />
    
    <title>Atelier Studio | Kartu Ucapan Digital Estetik</title>
    <meta name="description" content="Buat kartu ucapan digital estetik dan mewah dengan Atelier Studio. Kirim pesan spesial kepada orang tersayang sekarang juga.">
    <meta property="og:title" content="Atelier Studio | Kartu Ucapan Digital">
    <meta property="og:description" content="Kirim pesan spesial dengan desain estetik dan mewah. Buat kartu ucapanmu sendiri di sini!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://felix-x0.github.io/web-kartu-ucapan/">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@600&family=Great+Vibes&family=Playfair+Display:ital,wght@1,500&family=Cinzel:wght@500&family=Montserrat:wght@400&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #0a0a0a; --accent: #c5a059; }
        body { margin: 0; background: var(--bg); font-family: 'Poppins', sans-serif; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* Welcome Screen */
        #welcome { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s; }
        .btn-open { padding: 20px 40px; background: var(--accent); border: none; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 1.2em; color: black; }

        /* Kartu & Editor */
        .card { width: 300px; aspect-ratio: 3/4; padding: 40px; text-align: center; border-radius: 30px; display: flex; flex-direction: column; justify-content: center; transition: 0.5s; background: #111; box-sizing: border-box; margin: 0 auto; }
        .hidden { display: none !important; }
        .editor { width: 300px; margin-top: 20px; background: #1a1a1a; padding: 20px; border-radius: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #333; border: none; color: #fff; border-radius: 8px; box-sizing: border-box; }
        
        /* Tombol Socialbuzz */
        .btn-sb { background: #ff4d4d; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; text-decoration: none; display: block; text-align: center; }

        /* Animasi */
        @keyframes cyber-glow { 0%, 100% { box-shadow: 0 0 20px #00ffcc; } 50% { box-shadow: 0 0 50px #ff00ff; } }
        .theme-cyber { animation: cyber-glow 2s infinite; border: 2px solid #00ffcc; }
    </style>
</head>
<body>

    <div id="welcome">
        <h1>Atelier Studio</h1>
        <p>Karya seni kartu ucapan digital</p>
        <button class="btn-open" onclick="openCard()">Buka Kartu 💌</button>
    </div>

    <div id="app" class="hidden">
        <div id="cardCanvas" class="card theme-luxury">
            <h2 id="cardTo">Untuk: ...</h2>
            <p id="cardMsg" style="font-size: 1.5em; margin: 20px 0;">...</p>
            <p id="cardFrom">Dari: ...</p>
        </div>

        <div id="controls" class="editor">
            <input type="text" id="toIn" placeholder="Penerima...">
            <textarea id="msgIn" placeholder="Pesan..."></textarea>
            <input type="text" id="fromIn" placeholder="Pengirim...">
            
            <select id="themeSel" onchange="update()">
                <option value="theme-luxury">Tema: Luxury Gold</option>
                <option value="theme-cyber">Tema: Cyber Neon</option>
            </select>

            <select id="fontSel" onchange="update()">
                <option value="'Poppins', sans-serif">Font: Modern</option>
                <option value="'Dancing Script', cursive">Font: Handwriting</option>
                <option value="'Great Vibes', cursive">Font: Elegant</option>
                <option value="'Playfair Display', serif">Font: Classic</option>
                <option value="'Cinzel', serif">Font: Royal</option>
            </select>

            <button onclick="shareLink()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:8px; cursor:pointer; font-weight:bold;">Salin Link Kartu</button>
            
            <a href="https://sociabuzz.com/cadis77/tribe" class="btn-sb" target="_blank">Dukung Kreator (Socialbuzz)</a>
        </div>
    </div>

    <script>
        function openCard() {
            document.getElementById('welcome').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
            }, 800);
        }

        function update() {
            const to = document.getElementById('toIn').value;
            const msg = document.getElementById('msgIn').value;
            const from = document.getElementById('fromIn').value;
            const font = document.getElementById('fontSel').value;

            document.getElementById('cardTo').textContent = to ? "Untuk: " + to : "Untuk: ...";
            document.getElementById('cardMsg').textContent = msg || "...";
            document.getElementById('cardMsg').style.fontFamily = font;
            document.getElementById('cardFrom').textContent = from ? "Dari: " + from : "Dari: ...";
            document.getElementById('cardCanvas').className = 'card ' + document.getElementById('themeSel').value;
        }

        function shareLink() {
            const data = btoa(JSON.stringify({
                t: document.getElementById('toIn').value,
                m: document.getElementById('msgIn').value,
                f: document.getElementById('fromIn').value,
                th: document.getElementById('themeSel').value,
                ft: document.getElementById('fontSel').value
            }));
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?data=" + data);
            alert("Link berhasil disalin!");
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('data')) {
                try {
                    const d = JSON.parse(atob(params.get('data')));
                    document.getElementById('toIn').value = d.t;
                    document.getElementById('msgIn').value = d.m;
                    document.getElementById('fromIn').value = d.f;
                    document.getElementById('themeSel').value = d.th;
                    document.getElementById('fontSel').value = d.ft;
                    document.getElementById('controls').style.display = 'none';
                    update();
                } catch(e) { console.error("Data tidak valid"); }
            }
        };

        [document.getElementById('toIn'), document.getElementById('msgIn'), document.getElementById('fromIn')]
        .forEach(el => el.addEventListener('input', update));
    </script>
</body>
</html>
