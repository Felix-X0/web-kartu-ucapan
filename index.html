<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- VERIFIKASI GOOGLE -->
    <meta name="google-site-verification" content="eikd6Rzc695Y7uJtpPKJFB6zgb-V08adih6jovwYE6M" />
    
    <title>Atelier Studio | Professional Card</title>
    
    <!-- Library untuk Convert ke Gambar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:ital@0;1&family=Dancing+Script&family=Cinzel&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #f4f4f9; --card-bg: rgba(255, 255, 255, 0.9); --text: #1a1a1a; --accent: #c5a059; }
        .dark-theme { --bg: #0a0a0a; --card-bg: rgba(30, 30, 30, 0.9); --text: #ffffff; --accent: #d4af37; }

        body { margin: 0; background-color: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; transition: 0.5s; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

        .glass { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        .card { width: 350px; aspect-ratio: 3/4; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; margin-bottom: 20px; padding: 30px; }
        .hidden { display: none !important; }
        
        #themeToggle { position: fixed; top: 20px; right: 20px; padding: 10px 20px; cursor: pointer; border-radius: 20px; border: none; background: var(--accent); color: white; }
        
        input, textarea, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; background: var(--bg); color: var(--text); }
        .btn-main { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-share { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-sb { background: #ff4d4d; color: white; text-decoration: none; display: block; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <button id="themeToggle" onclick="toggleTheme()">☀️ / 🌙</button>

    <div id="welcome" class="glass" style="text-align: center; margin-top: 100px;">
        <h1>Atelier Studio</h1>
        <button class="btn-main" onclick="openCard()">Mulai Mendesain 💌</button>
    </div>

    <div id="app" class="hidden" style="margin-top: 50px;">
        <div id="cardCanvas" class="card glass">
            <h2 id="cardTo">Untuk: ...</h2>
            <p id="cardMsg" style="font-size: 1.5em; margin: 20px 0; word-break: break-word;">...</p>
            <p id="cardFrom">Dari: ...</p>
        </div>

        <div class="glass" style="width: 350px;">
            <input type="text" id="toIn" placeholder="Penerima...">
            <textarea id="msgIn" placeholder="Pesan..."></textarea>
            <input type="text" id="fromIn" placeholder="Pengirim...">
            
            <select id="fontSel" onchange="update()">
                <option value="'Poppins', sans-serif">Modern</option>
                <option value="'Playfair Display', serif">Klasik</option>
                <option value="'Dancing Script', cursive">Handwriting</option>
                <option value="'Cinzel', serif">Royal</option>
            </select>
            
            <button class="btn-share" onclick="shareDirectly()">Bagikan Kartu (WA/IG/DLL)</button>
            <button class="btn-main" onclick="shareLink()">Salin Link Web</button>
            <a href="https://sociabuzz.com/cadis77/tribe" class="btn-sb" target="_blank">Dukung Kreator</a>
        </div>
    </div>

    <script>
        function toggleTheme() { document.body.classList.toggle('dark-theme'); }
        function openCard() { document.getElementById('welcome').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); }

        function update() {
            document.getElementById('cardTo').textContent = "Untuk: " + document.getElementById('toIn').value;
            document.getElementById('cardMsg').textContent = document.getElementById('msgIn').value;
            document.getElementById('cardMsg').style.fontFamily = document.getElementById('fontSel').value;
            document.getElementById('cardFrom').textContent = "Dari: " + document.getElementById('fromIn').value;
        }

        // FUNGSI SHARE LANGSUNG KE APLIKASI
        async function shareDirectly() {
            const card = document.getElementById('cardCanvas');
            const canvas = await html2canvas(card, { scale: 4, backgroundColor: null });
            
            canvas.toBlob(async (blob) => {
                const file = new File([blob], "Atelier-Card.png", { type: "image/png" });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: 'Kartu Ucapan',
                            text: 'Lihat kartu ucapan spesial untukmu!'
                        });
                    } catch (err) {
                        console.log('Share dibatalkan');
                    }
                } else {
                    // Fallback jika browser tidak support share
                    const link = document.createElement('a');
                    link.download = 'Atelier-Card.png';
                    link.href = canvas.toDataURL('image/png', 1.0);
                    link.click();
                }
            });
        }

        function shareLink() {
            const data = btoa(JSON.stringify({
                t: document.getElementById('toIn').value,
                m: document.getElementById('msgIn').value,
                f: document.getElementById('fromIn').value,
                ft: document.getElementById('fontSel').value
            }));
            navigator.clipboard.writeText(window.location.origin + window.location.pathname + "?data=" + data);
            alert("Link berhasil disalin!");
        }

        [document.getElementById('toIn'), document.getElementById('msgIn'), document.getElementById('fromIn')]
        .forEach(el => el.addEventListener('input', update));

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('data')) {
                try {
                    const d = JSON.parse(atob(params.get('data')));
                    document.getElementById('toIn').value = d.t;
                    document.getElementById('msgIn').value = d.m;
                    document.getElementById('fromIn').value = d.f;
                    document.getElementById('fontSel').value = d.ft;
                    document.getElementById('welcome').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                    update();
                } catch(e) {}
            }
        };
    </script>
</body>
</html>
