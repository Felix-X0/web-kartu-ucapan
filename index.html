<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembuat Kartu Ucapan Estetik v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&family=Dancing+Script:wght@600&family=Playfair+Display:ital,wght@1,500&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Pembuat Kartu Ucapan Digital</h1>
            <p>Bikin ucapan estetik dalam 10 detik. Tanpa login, tanpa ribet.</p>
        </header>

        <main class="app-grid">
            <section class="controls-panel">
                <div class="form-group">
                    <label>Untuk Siapa?</label>
                    <input type="text" id="toInput" placeholder="Contoh: Kak Shinta" value="Kak Shinta">
                </div>
                
                <div class="form-group">
                    <label>Tulis Pesanmu</label>
                    <textarea id="messageInput" rows="4" placeholder="Tulis ucapan kamu di sini...">Selamat Ulang Tahun yang ke-25! Semoga makin sukses, sehat selalu, dan semua impianmu tercapai. Bahagia terus ya!</textarea>
                </div>

                <div class="form-group">
                    <label>Dari Siapa?</label>
                    <input type="text" id="fromInput" placeholder="Contoh: Adun" value="Adun">
                </div>

                <div class="form-group">
                    <label>Pilih Gaya Tulisan</label>
                    <select id="fontSelector">
                        <option value="'Playfair Display', serif">Elegan (Playfair)</option>
                        <option value="'Dancing Script', cursive">Tegak Bersambung (Dancing)</option>
                        <option value="'Caveat', cursive">Tulisan Tangan (Caveat)</option>
                        <option value="'Poppins', sans-serif">Modern (Poppins)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Pilih Tema & Motif</label>
                    <div class="theme-selector">
                        <button class="theme-btn active" data-theme="theme-1">Midnight Blue</button>
                        <button class="theme-btn" data-theme="theme-2">Romantic Pink</button>
                        <button class="theme-btn" data-theme="theme-3">Forest Green</button>
                        <button class="theme-btn" data-theme="theme-4">Polkadot Ceria</button>
                        <button class="theme-btn" data-theme="theme-5">Garis Estetik</button>
                    </div>
                </div>

                <div class="button-group">
                    <button id="downloadBtn" class="download-btn">Download Gambar</button>
                    <button id="shareBtn" class="share-btn">Kirim Langsung 📲</button>
                </div>
            </section>

            <section class="preview-panel">
                <div id="cardCanvas" class="card-canvas theme-1">
                    <div class="card-content">
                        <p class="card-to">Dear, <span id="cardToText">Kak Shinta</span></p>
                        <p class="card-message" id="cardMessageText">Selamat Ulang Tahun yang ke-25! Semoga makin sukses, sehat selalu, dan semua impianmu tercapai. Bahagia terus ya!</p>
                        <p class="card-from">From: <span id="cardFromText">Adun</span></p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
