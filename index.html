<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Studio Premium</title>
    <!-- GOOGLE SEARCH CONSOLE VERIFIKASI (JANGAN DIHAPUS) -->
    <meta name="google-site-verification" content="eikd6Rzc695Y7uJtpPKJFB6zgb-V08adih6jovwYE6M" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-wrapper">
        <!-- AREA KARTU -->
        <div id="cardCanvas" class="card-container theme-luxury">
            <h2 id="cardToText">Untuk: Kak Shinta</h2>
            <p id="cardMessageText">Selamat Ulang Tahun! Semoga bahagia selalu.</p>
            <p id="cardFromText">Dari: Adun</p>
        </div>

        <!-- PANEL KONTROL -->
        <div class="controls">
            <input type="text" id="toInput" placeholder="Penerima..." value="Kak Shinta">
            <textarea id="messageInput" placeholder="Pesan...">Selamat Ulang Tahun! Semoga bahagia selalu.</textarea>
            <input type="text" id="fromInput" placeholder="Pengirim..." value="Adun">

            <select id="fontSelector">
                <option value="'Cormorant Garamond', serif">Elegance (Cormorant)</option>
                <option value="'Dancing Script', cursive">Handwriting (Dancing)</option>
                <option value="'Cinzel', serif">Fantasy/Dark (Cinzel)</option>
                <option value="'Playfair Display', serif">Luxury (Playfair)</option>
                <option value="'Special Elite', cursive">Typewriter (Elite)</option>
            </select>

            <select id="themeSelector">
                <option value="theme-luxury">Luxury Gold</option>
                <option value="theme-cyber">Cyber Neon</option>
                <option value="theme-anime">Anime Style</option>
                <option value="theme-kartun">Kartun Playful</option>
                <option value="theme-floral">Floral Soft</option>
            </select>

            <button id="shareBtn">Generate & Share Link</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
